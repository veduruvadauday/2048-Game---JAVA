<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2048 — Java (Swing)</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
  <style>
    html, body { margin: 0; height: 100%; }
    body { display: flex; flex-direction: column; font-family: system-ui, sans-serif; }
    #banner {
      font-size: 0.85rem;
      padding: 0.5rem 1rem;
      background: #f4f1ea;
      color: #444;
      border-bottom: 1px solid #ddd;
      line-height: 1.4;
    }
    #banner a { color: #2563eb; }
    #cjframe { flex: 1; min-height: 520px; width: 100%; }
  </style>
</head>
<body>
  <div id="banner">
    This is your <strong>original Java / Swing</strong> game, running in the browser via
    <a href="https://cheerpj.com/" target="_blank" rel="noopener">CheerpJ</a>
    (Java bytecode + WASM). First load can take a short while.
    MySQL high scores only apply to the <strong>desktop</strong> build (<code>./run.sh</code>);
    here the app runs without the JDBC driver, same as when the DB is offline.
  </div>
  <div id="cjframe" aria-label="CheerpJ display"></div>
  <script type="module">
    // /app/foo.jar maps to https://ORIGIN/foo.jar (see CheerpJ docs). Project Pages is ORIGIN/REPO/, so use /app/REPO/game.jar (not /app/game.jar).
    function cheerpAppJarPath(fileName) {
      let p = window.location.pathname.replace(/\/$/, "");
      const last = p.split("/").pop() || "";
      if (/\.[a-zA-Z0-9]+$/.test(last)) {
        p = p.replace(/\/[^/]+$/, "");
      }
      const prefix = p && p !== "/" ? p : "";
      return "/app" + prefix + "/" + fileName;
    }
    await cheerpjInit({ version: 17 });
    cheerpjCreateDisplay(-1, -1, document.getElementById("cjframe"));
    await cheerpjRunJar(cheerpAppJarPath("game.jar"));
  </script>
</body>
</html>
